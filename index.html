<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Conversion</title>
  <link rel="icon" href="./assets/img/favicon.svg">
  <script src="./main.js" defer></script>
</head>
<body>
  <main class="main">
    <article class="unit-conversion">
      <h1 class="tilte">metric/imperial unit conversion</h1>
      <form action="#" id="form-el" class="form-el" autocomplete="off">
        <input type="number" id="input-el" class="input-el" min="0" max="1000" autofocus>
        <button id="btn-el" class="btn-el" disabled>convert</button>
      </form>
      <div class="result">
        <section class="card">
          <h2 class="card__title">length (meter/feet)</h2>
          <p id="length-result" class="card__result"></p>
        </section>
        <section class="card">
          <h2 class="card__title">volume (liters/gallons)</h2>
          <p id="volume-result" class="card__result"></p>
        </section>
        <section class="card">
          <h2 class="card__title">mass (kilograms/pounds)</h2>
          <p id="mass-result" class="card__result"></p>
        </section>
      </div>
    </article>
  </main>
  <footer class="attribution">
    <small>
      From the "Learn JavaScript" course by <a href="https://scrimba.com/learn/learnjavascript" class="attribution__link" target="_blank" rel="noreferrer">Scrimba</a> - Coded by <a href="https://github.com/mendez-v/unit-conversion" class="attribution__link" target="_blank" rel="noreferrer">vimp</a> ✨
    </small>
  </footer>
</body>
</html>
